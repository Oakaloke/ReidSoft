<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 40px;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 20px;
    }

    p {
      font-size: 22px;
      color: #d1d5db;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 28px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 18px;
      transition: 0.3s;
    }

    .button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Welcome to My Website</h1>

    <p>
      My new website is officially live using Cloudflare Pages and my custom domain.
    </p>

    <a class="button" href="#">
      Learn More
    </a>
  </div>
</body>
</html>
